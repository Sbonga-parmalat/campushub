<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px 0;
            color: #ffffff;
        }
        
        .wrapper {
            max-width: 400px;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            width: 90%;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #00d4ff;
            font-size: 26px;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888888;
            font-size: 14px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #a0a0a0;
            text-align: left;
            margin-top: 25px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .link-card {
            display: block;
            text-align: center;
            background: #0a0a0c;
            color: #ffffff;
            padding: 16px;
            margin: 12px 0;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #0056b3;
            transition: all 0.2s ease-in-out;
        }

        .link-card:active {
            background: #0056b3;
            box-shadow: 0 0 15px rgba(0, 86, 179, 0.6);
            transform: scale(0.98);
        }

        .back-btn {
            display: block;
            text-align: center;
            background: #16161a;
            color: #ffffff;
            padding: 14px;
            margin-top: 40px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            border: 1px solid #333333;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #333333;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Campus Library</h1>
        <p class="subtitle">Knowledge & Research</p>
        
        <div class="section-title">🔍 Research & Facts</div>
        <a href="https://scholar.google.com" class="link-card" target="_blank">Google Scholar</a>
        <a href="https://www.britannica.com" class="link-card" target="_blank">Encyclopedia Britannica</a>
        
        <div class="section-title">📚 Digital Textbooks</div>
        <a href="https://openstax.org" class="link-card" target="_blank">OpenStax Free Textbooks</a>
        <a href="https://www.gutenberg.org" class="link-card" target="_blank">Project Gutenberg (Free E-books)</a>
        
        <div class="section-title">🛠️ Essential Tools</div>
        <a href="https://www.google.com/search?q=scientific+calculator" class="link-card" target="_blank">Scientific Calculator</a>
        <a href="https://pomofocus.io" class="link-card" target="_blank">Study Timer (Pomodoro)</a>
        
        <a href="index.html" class="back-btn">🏠 Back to Home</a>
    </div>

    <footer style="color: #444444; text-align: center; margin-top: 40px; font-weight: bold; font-size: 12px;">
        <p>&copy; 2026 Mwandla Sbongokuhle</p>
    </footer>

</body>
</html>
