<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {

            padding: 20px 0;
            color: #ffffff;
        }
        
        .wrapper {
            max-width: 400px;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            width: 90%;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #00d4ff;

            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .subtitle {

            margin-top: 0;

        }

        .section-title {

            margin-top: 25px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .link-card {

            padding: 16px;

            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #0056b3;
            transition: all 0.2s ease-in-out;
        }

        .link-card:active {
            background: #0056b3;
            box-shadow: 0 0 15px rgba(0, 86, 179, 0.6);
            transform: scale(0.98);
        }

            display: block;
            text-align: center;

            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            border: 1px solid #333333;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #333333;
        }
    </style>
</head>
