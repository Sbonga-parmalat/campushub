<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Portal - Campus Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f4f4;
            --container-bg: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --card-bg: #ffffff;
            --card-text: #2c3e50;
            --hub-title: #0056b3;
            --btn-gradient: linear-gradient(135deg, #0056b3, #00d4ff);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: rgba(0, 0, 0, 0.6);
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-text: #ffffff;
            --hub-title: #00d4ff;
            --btn-gradient: linear-gradient(135deg, #7000ff, #00d4ff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.4s ease;
        }
        
        .container {
            max-width: 420px;
            margin: 20px auto;
            padding: 25px;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            position: relative;
            transition: background 0.4s ease;
        }

        @media (max-width: 480px) {
            .container {
                margin: 60px auto 20px auto;
                width: 85%;
            }
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: var(--card-text);
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            width: fit-content;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        .lms-card {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 18px;
            color: var(--card-text);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-align: left;
            margin-bottom: 15px;
        }

        .action-button {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 14px;
            background: var(--btn-gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }

        .action-button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,212,255,0.5);
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--card-bg);
            color: var(--card-text);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            z-index: 10;
        }
    </style>
</head>
<body style="background-image:url('mfolozi.png'); background-size: contain; background-repeat: no-repeat; background-attachment: fixed; background-position: center;">

    <div class="container">
        <button class="theme-toggle" id="themeBtn" title="Toggle Theme">🌓</button>

        <a href="index.html" class="back-btn">
            ⬅️ Back to Main Menu
        </a>

        <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
            <img src="mfolozi.png" alt="School Logo" style="width: 42px; height: 42px; object-fit: contain; border-radius: 6px;">
            <h1 style="color: var(--hub-title); font-family: 'Montserrat', sans-serif; font-size: 24px; margin: 0;">LMS Portal</h1>
        </div>

        <div class="lms-card">
            <h3 style="margin-top: 0; font-size: 18px; color: var(--hub-title);">💻 Online Learning Directory</h3>
            <p style="font-size: 14px; line-height: 1.5; opacity: 0.9;">
                Access your digital study courses, submitted projects, assignments, and curriculum resources.
            </p>
            
            <a href="https://www.umfolozicollege.edu.za/" target="_blank" class="action-button">
                🚀 Launch LMS Classroom
            </a>
        </div>
    </div>

    <footer style="color:#00d4ff; text-align:center; margin-top:30px; font-weight:bold;">
        <p>&copy; 2026 Mwandla Sbongokuhle</p>
    </footer>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var themeBtn = document.getElementById("themeBtn");
        if (themeBtn) {
            themeBtn.addEventListener("click", function() {
                var currentTheme = document.documentElement.getAttribute("data-theme");
                if (currentTheme === "dark") {
                    document.documentElement.setAttribute("data-theme", "light");
                } else {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            });
        }
    });
    </script>
</body>
</html>
